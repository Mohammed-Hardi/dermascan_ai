project_name: dermascan-ai
model_name: custom_cnn
checkpoint_name: dermascan-acne-eczema-psoriasis-custom-cnn.pt
num_classes: 3
class_names: [acne, eczema, psoriasis]
input_size: 160
batch_size: 32
epochs: 6
learning_rate: 0.0005
weight_decay: 0.0001
early_stopping_patience: 3
use_class_weights: true
pretrained: false
num_workers: 0
seed: 42
data:
  train_csv: ml/data/balanced_three_class/train.csv
  val_csv: ml/data/balanced_three_class/val.csv
  test_csv: ml/data/balanced_three_class/test.csv
outputs:
  model_dir: ml/outputs/models
  report_dir: ml/outputs/reports/acne_eczema_psoriasis
  plot_dir: ml/outputs/plots/acne_eczema_psoriasis
augmentations:
  crop_scale: [0.82, 1.0]
  horizontal_flip_probability: 0.5
  rotation_degrees: 10
  color_jitter:
    brightness: 0.14
    contrast: 0.14
    saturation: 0.10
    hue: 0.02
  blur_probability: 0.05
