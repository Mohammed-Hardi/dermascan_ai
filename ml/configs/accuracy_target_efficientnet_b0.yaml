project_name: dermascan-ai
model_name: torchvision_efficientnet_b0
checkpoint_name: dermascan-acne-eczema-psoriasis-efficientnet-b0.pt
num_classes: 3
class_names: [acne, eczema, psoriasis]
input_size: 224
batch_size: 16
epochs: 35
learning_rate: 0.00025
weight_decay: 0.0002
early_stopping_patience: 8
use_class_weights: true
pretrained: true
num_workers: 0
seed: 42
data:
  train_csv: ml/data/balanced_three_class/train.csv
  val_csv: ml/data/balanced_three_class/val.csv
  test_csv: ml/data/balanced_three_class/test.csv
outputs:
  model_dir: ml/outputs/models
  report_dir: ml/outputs/reports/accuracy_target_efficientnet_b0
  plot_dir: ml/outputs/plots/accuracy_target_efficientnet_b0
augmentations:
  crop_scale: [0.70, 1.0]
  horizontal_flip_probability: 0.5
  rotation_degrees: 18
  color_jitter:
    brightness: 0.22
    contrast: 0.22
    saturation: 0.16
    hue: 0.025
  blur_probability: 0.08
